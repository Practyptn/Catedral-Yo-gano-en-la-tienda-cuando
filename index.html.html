<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yo gano en la tienda cuando</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #e3f2fd; /* Azul cielo suave basado en la imagen */
            color: #1e3a5f;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-banner {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5px;
            font-size: 1.3rem;
            letter-spacing: 0.5px;
            font-weight: 700;
            color: #0277bd; /* Azul vivo del avión de la imagen */
            border-bottom: 2px solid #b3e5fc;
            margin-bottom: 20px;
        }

        .header-banner .right-text {
            font-size: 0.8rem;
            font-weight: 400;
            color: #546e7a;
        }

        .container {
            display: flex;
            gap: 25px;
            max-width: 1200px;
            width: 100%;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #b3e5fc;
            box-shadow: 0 4px 25px rgba(2, 119, 189, 0.06);
        }

        .map-container {
            flex: 1.4;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f8ff;
            border-radius: 8px;
            padding: 10px;
        }

        svg {
            width: 100%;
            height: auto;
            max-height: 680px;
        }

        .fondo-mar {
            fill: #4fc3f7;
        }
        .suelo-tierra {
            fill: #e1f5fe;
        }
        .silueta-edificio {
            fill: #ffffff;
            stroke: #0277bd;
            stroke-width: 1.5;
        }
        .linea-arquitectura {
            fill: none;
            stroke: #0288d1;
            stroke-width: 1.2;
        }
        .linea-detalle {
            fill: none;
            stroke: #b3e5fc;
            stroke-width: 1px;
        }

        /* Bloques interactivos */
        .ladrillo {
            fill: #ffffff;
            stroke: #29b6f6;
            stroke-width: 1.2;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .ladrillo:hover {
            fill: #e1f5fe;
            stroke: #01579b;
            stroke-width: 1.8;
        }

        .ladrillo.activo {
            fill: #0288d1;
            stroke: #01579b;
            stroke-width: 2;
            filter: drop-shadow(0px 0px 8px rgba(2, 136, 209, 0.4));
        }

        .ladrillo-texto {
            font-size: 14px;
            font-weight: 600;
            fill: #0277bd;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
            transition: fill 0.2s;
        }

        .ladrillo.activo + .ladrillo-texto {
            fill: #ffffff;
        }

        /* Panel lateral */
        .panel-info {
            flex: 0.8;
            width: 100%;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #e1f5fe;
            padding-left: 25px;
            justify-content: flex-start;
        }

        .panel-info h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 0;
            color: #01579b;
        }

        .panel-info p {
            font-size: 0.85rem;
            color: #546e7a;
            line-height: 1.4;
            margin: 5px 0 15px 0;
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 12px;
            border: 1px solid #b3e5fc;
            background-color: #f7fcff;
            border-radius: 6px;
            resize: none;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.95rem;
            color: #01579b;
        }

        textarea:focus {
            outline: none;
            border-color: #0288d1;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(2, 136, 209, 0.1);
        }

        button {
            margin-top: 15px;
            padding: 14px;
            background-color: #0288d1;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #01579b;
        }

        button:disabled {
            background-color: #b0bec5;
            color: #ffffff;
            cursor: not-allowed;
        }

        .contador {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #546e7a;
            border-top: 1px solid #e1f5fe;
            padding-top: 15px;
            font-weight: 500;
        }

        /* Pop-up (Modal) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(1, 87, 155, 0.3);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #b3e5fc;
            width: 90%;
            max-width: 550px;
            box-shadow: 0 10px 35px rgba(1, 87, 155, 0.12);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            position: relative;
        }

        .modal-overlay.open .modal-content {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e1f5fe;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 600;
            color: #01579b;
        }

        .close-button {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: #b0bec5;
            padding: 0;
            margin: 0;
            transition: color 0.2s;
        }

        .close-button:hover {
            color: #01579b;
        }

        .modal-body textarea {
            height: 200px;
            background-color: #ffffff;

        }

        .modal-footer {

        .btn-secondary {

            display: flex;

            padding: 15px 5px;
            font-size: 0.75rem;
            color: #546e7a;
        }
    </style>
</head>

        let bloqueActivoId = null;

        const modal = document.getElementById('modal-bloque');
        const modalTitulo = document.getElementById('modal-titulo');
        const modalTexto = document.getElementById('modal-texto-espacio');
        const btnCerrarModal = document.getElementById('btn-cerrar-modal');
        const btnCancelarModal = document.getElementById('btn-cancelar-modal');
        const btnGuardarModal = document.getElementById('btn-guardar-modal');

        const tituloEspacio = document.getElementById('titulo-espacio');
        const textoEspacio = document.getElementById('texto-espacio');
        const btnGuardar = document.getElementById('btn-guardar');

        function construirMatrizLadrillos() {
            const contenedor = document.getElementById('capa-ladrillos');
            let idNum = 1;

            const w = 62;  
            const h = 42;  
            const gapX = 6;
            const gapY = 6;

            for (let fila = 0; fila < 3; fila++) {
                const y = 132 + (fila * (h + gapY));
                for (let col = 0; col < 6; col++) {
                    const x = 194 + (col * (w + gapX));
                    if (idNum <= 48) renderizarBloque(contenedor, x, y, w, h, idNum++);
                }
            }

            for (let fila = 0; fila < 4; fila++) {
                const y = 276 + (fila * (h + gapY));
                for (let col = 0; col < 2; col++) {
                    const x = 194 + (col * (w + gapX));
                    if (idNum <= 48) renderizarBloque(contenedor, x, y, w, h, idNum++);
                }
                for (let col = 0; col < 2; col++) {
                    const x = 460 + (col * (w + gapX));
                    if (idNum <= 48) renderizarBloque(contenedor, x, y, w, h, idNum++);
                }
            }
            actualizarContador();
        }

        function renderizarBloque(parent, x, y, w, h, id) {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("x", x);
            rect.setAttribute("y", y);
            rect.setAttribute("width", w);
            rect.setAttribute("height", h);
            rect.setAttribute("rx", "3"); 
            rect.setAttribute("class", "ladrillo");
            rect.setAttribute("id", `ladrillo-${id}`);
            rect.addEventListener('click', () => abrirManejadorBloque(`ladrillo-${id}`));

            const texto = document.createElementNS("http://www.w3.org/2000/svg", "text");
            texto.setAttribute("x", x + (w / 2));
            texto.setAttribute("y", y + (h / 2));
            texto.setAttribute("class", "ladrillo-texto");
            texto.textContent = id;

            g.appendChild(rect);
            g.appendChild(texto);
            parent.appendChild(g);
        }

        function abrirManejadorBloque(id) {
            if (bloqueActivoId) {
                const anterior = document.getElementById(bloqueActivoId);
                if (anterior) anterior.classList.remove('activo');
            }

            bloqueActivoId = id;
            document.getElementById(id).classList.add('activo');

            textoEspacio.disabled = false;
            btnGuardar.disabled = false;
            tituloEspacio.innerText = datosFachada[id].nombre;
            textoEspacio.value = datosFachada[id].texto;

            modalTitulo.innerText = datosFachada[id].nombre;
            modalTexto.value = datosFachada[id].texto;
            modal.classList.add('open');
            setTimeout(() => modalTexto.focus(), 100);
        }

        function guardarInformacion(textoA_Guardar) {
            if (bloqueActivoId) {
                datosFachada[bloqueActivoId].texto = textoA_Guardar;
                textoEspacio.value = textoA_Guardar;
                modalTexto.value = textoA_Guardar;
                actualizarContador();
            }
        }

        btnGuardar.addEventListener('click', () => {
            guardarInformacion(textoEspacio.value);
            alert(`¡Texto actualizado temporalmente!`);
        });

        btnGuardarModal.addEventListener('click', () => {
            guardarInformacion(modalTexto.value);
            cerrarModal();
        });

        function cerrarModal() {
            modal.classList.remove('open');
        }

        btnCerrarModal.addEventListener('click', cerrarModal);
        btnCancelarModal.addEventListener('click', cerrarModal);
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) cerrarModal();
        });

        function actualizarContador() {
            const guardados = Object.values(datosFachada).filter(item => item.texto.trim() !== "").length;
            document.getElementById('contador-progreso').innerText = `Secciones completadas: ${guardados} / 48`;
        }

        construirMatrizLadrillos();
    </script>
</body>
